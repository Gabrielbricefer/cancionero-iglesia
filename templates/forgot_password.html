{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0">🔑 Recuperar Contraseña</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Ingresa tu nombre de usuario para comenzar el proceso de recuperación.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Continuar</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('login') }}">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
