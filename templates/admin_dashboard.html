{% extends "base.html" %}

{% block content %}
<h1>Panel de Administración</h1>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Usuarios Totales</h5>
                <h2>{{ total_users }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Canciones Totales</h5>
                <h2>{{ total_songs }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger mb-3">
            <div class="card-body">
                <h5 class="card-title">Usuarios Bloqueados</h5>
                <h2>{{ blocked_users }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Gestión de Usuarios</h5>
            </div>
            <div class="card-body">
                <a href="{{ url_for('admin_users') }}" class="btn btn-primary w-100">
                    <i class="bi bi-people"></i> Gestionar Usuarios
                </a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Gestión de Canciones</h5>
            </div>
            <div class="card-body">
                <a href="{{ url_for('admin_songs') }}" class="btn btn-success w-100">
                    <i class="bi bi-music-note"></i> Gestionar Canciones
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
